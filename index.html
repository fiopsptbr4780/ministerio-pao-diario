<!DOCTYPE html>
<!-- Ministério Pão Diário | https://fiopsptbr4780.github.io/ministerio-pao-diario/ -->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ministério Pão Diário</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:#1a0a00;color:#2c1a0e;min-height:100vh}

/* COVER */
#cover{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(160deg,#3d1a00,#7a3e00 40%,#c8790a 80%,#f5b942);text-align:center;padding:40px 20px;color:#fff8ee}
.icon{font-size:80px;margin-bottom:16px}
#cover h1{font-size:clamp(2rem,5vw,3.2rem);font-weight:700;letter-spacing:2px;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.sub{font-size:1.1rem;margin-top:10px;opacity:.9}
.line{width:70px;height:2px;background:#f5b942;margin:18px auto}
.intro{max-width:500px;font-size:.95rem;line-height:1.8;opacity:.87}
.cnt{margin-top:14px;font-size:.82rem;opacity:.65}
#cover button{margin-top:36px;padding:13px 38px;background:#fff;color:#7a3e00;border:none;border-radius:50px;font-size:1rem;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.3);transition:transform .2s}
#cover button:hover{transform:translateY(-2px)}

/* INDEX */
#index-page{min-height:100vh;background:#fdf6ee;padding:40px 20px}
#index-page h2{font-size:2rem;color:#7a3e00;text-align:center;margin-bottom:6px}
.isub{text-align:center;color:#a0652a;font-size:.9rem;margin-bottom:28px}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;max-width:1050px;margin:0 auto 36px}
.card{background:#fff;border-radius:12px;padding:16px 18px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.08);border-top:4px solid #c8790a;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.14)}
.card .n{font-size:.75rem;color:#c8790a;font-weight:700;letter-spacing:1px;margin-bottom:4px}
.card h3{font-size:.98rem;color:#2c1a0e;margin-bottom:8px}
.tag{display:inline-block;font-size:.7rem;padding:2px 10px;border-radius:20px;font-weight:700}
.fe{background:#fff3cd;color:#856404}.esperanca{background:#d1ecf1;color:#0c5460}
.coragem{background:#f8d7da;color:#721c24}.paciencia{background:#d4edda;color:#155724}
.reflexao{background:#e2d9f3;color:#4a2c7a}.proposito{background:#fde8d8;color:#7a3e00}
.amor{background:#fce4ec;color:#880e4f}.humildade{background:#e8f5e9;color:#1b5e20}

.back{display:block;margin:0 auto;padding:11px 32px;background:#c8790a;color:#fff;border:none;border-radius:50px;font-size:.95rem;font-weight:700;cursor:pointer;transition:background .2s}
.back:hover{background:#a86200}

/* READER */
#reader{min-height:100vh;background:#fdf6ee}
.rh{background:linear-gradient(135deg,#7a3e00,#c8790a);color:#fff;padding:28px 36px}
.rh .bb{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.4);color:#fff;padding:5px 14px;border-radius:20px;cursor:pointer;font-size:.8rem;margin-bottom:18px;display:inline-block}
.rh .pn{font-size:.75rem;opacity:.7;letter-spacing:2px;margin-bottom:6px}
.rh h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:700}
.badges{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.bdg{font-size:.73rem;padding:3px 12px;border-radius:20px;font-weight:700;background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.3)}
.bdgt{background:rgba(245,185,66,.3);border-color:rgba(245,185,66,.6)}
.rb{max-width:740px;margin:0 auto;padding:32px 22px 56px}
.vbox{background:linear-gradient(135deg,#fff8ee,#fdebc8);border-left:4px solid #c8790a;border-radius:0 12px 12px 0;padding:16px 22px;margin-bottom:24px;font-style:italic;font-size:1.03rem;color:#5c3200;line-height:1.7}
.mtxt{line-height:1.85;font-size:.97rem;color:#2c1a0e}
.mtxt p{margin-bottom:14px}
.pbox{background:linear-gradient(135deg,#7a3e00,#c8790a);color:#fff;border-radius:14px;padding:22px 26px;margin:28px 0;text-align:center;font-style:italic;font-size:1.08rem;line-height:1.6;box-shadow:0 4px 20px rgba(122,62,0,.3)}
.pbox .pl{font-style:normal;font-size:.7rem;font-weight:700;letter-spacing:2px;opacity:.8;margin-bottom:6px;font-family:sans-serif}
.aline{text-align:right;font-style:italic;color:#a0652a;font-size:.88rem;margin-top:18px}
.mbox{background:#fff;border:1px solid #f0dbc0;border-radius:12px;padding:16px 20px;margin-top:24px;display:flex;gap:12px;align-items:flex-start}
.mbox .mi{font-size:1.7rem}
.mbox .ml{font-size:.7rem;font-weight:700;color:#c8790a;letter-spacing:1px;margin-bottom:3px;font-family:sans-serif}
.mbox p{font-size:.88rem;color:#5c3200;line-height:1.5}
.navb{display:flex;gap:10px;margin-top:32px}
.nb{flex:1;padding:11px;border:2px solid #c8790a;background:#fff;color:#7a3e00;border-radius:10px;cursor:pointer;font-size:.88rem;font-weight:700;transition:all .2s}
.nb:hover{background:#c8790a;color:#fff}
.nb:disabled{opacity:.25;cursor:default}
.nb.p{background:#c8790a;color:#fff}
.nb.p:hover{background:#a86200}

/* Loading */
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#fdf6ee;color:#a0652a;font-size:1.1rem;gap:14px}
.spinner{width:40px;height:40px;border:4px solid #f0dbc0;border-top-color:#c8790a;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:600px){.rh{padding:20px 16px}.rb{padding:20px 14px 40px}.navb{flex-direction:column}}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <span>Carregando mensagens…</span>
</div>

<div id="cover" style="display:none">
  <div class="icon">📖</div>
  <h1>Ministério<br>Pão Diário</h1>
  <div class="line"></div>
  <p class="sub">Reflexões que alimentam a alma</p>
  <p class="intro">Mensagens de encorajamento, fé e esperança para cada etapa da jornada espiritual.</p>
  <p class="cnt" id="cnt-cover"></p>
  <button onclick="showIndex()">Começar a Ler ›</button>
</div>

<div id="index-page" style="display:none">
  <h2>📖 Índice</h2>
  <p class="isub">Escolha uma mensagem</p>
  <div id="grid"></div>
  <button class="back" onclick="showCover()">← Capa</button>
</div>

<div id="reader" style="display:none"></div>

<script>
// ============================================================
// DADOS — edite o arquivo mensagens.json para adicionar novas
// mensagens. Basta seguir o mesmo padrão de objeto abaixo.
// ============================================================
let msgs = [];
let cur = 0;

// Tenta carregar mensagens.json; se falhar usa os dados embutidos
fetch('./mensagens.json')
  .then(r => { if(!r.ok) throw new Error('no json'); return r.json(); })
  .then(data => { 
    // Captura o dia de hoje no fuso horário do leitor (Formato AAAA-MM-DD)
    const hoje = new Date().toLocaleDateString('sv-SE'); 
    
    // FILTRO AUTOMÁTICO: Oculta publicações cujas datas pertencem ao futuro
    msgs = data.filter(m => !m.data || m.data <= hoje); 
    
    init(); 
  })
  .catch(() => { 
    msgs = getMensagensEmbutidas(); 
    init(); 
  });

function init(){
  document.getElementById('loading').style.display = 'none';
  if (msgs.length > 0) {
    document.getElementById('cnt-cover').textContent = msgs.length + ' mensagens · Desde ' + msgs[0].mes;
  } else {
    document.getElementById('cnt-cover').textContent = 'Nenhuma mensagem disponível hoje.';
  }
  showCover();
}

function showCover(){
  hide('index-page'); hide('reader');
  show('cover');
  window.scrollTo(0,0);
}

function showIndex(){
  hide('cover'); hide('reader');
  const g = document.getElementById('grid');
  g.innerHTML = '';
  msgs.forEach((m,i)=>{
    const d = document.createElement('div');
    d.className = 'card';
    d.innerHTML = `<div class="n">${m.mes}</div><h3>${m.icone} ${m.titulo}</h3><span class="tag ${m.tema||'fe'}">${(m.tema||'fé').charAt(0).toUpperCase()+(m.tema||'fé').slice(1)}</span>`;
    d.onclick = ()=>{ cur=i; showReader(i); };
    g.appendChild(d);
  });
  show('index-page');
  window.scrollTo(0,0);
}

function showReader(i){
  cur = i;
  const m = msgs[i];
  hide('cover'); hide('index-page');
  const r = document.getElementById('reader');
  r.innerHTML = `
  <div class="rh">
    <button class="bb" onclick="showIndex()">← Índice</button>
    <div class="pn">MENSAGEM ${String(m.id).padStart(2,'0')}</div>
    <h1>${m.icone} ${m.titulo}</h1>
    <div class="badges"><span class="bdg">${m.mes}</span><span class="bdg bdgt">${m.ref}</span></div>
  </div>
  <div class="rb">
    <div class="vbox">“${m.versiculoTexto||''}”<div class="aline">— ${m.ref}</div></div>
    <div class="mtxt">${formatarTexto(m.texto || m.versiculoTexto)}</div>
    ${m.oracao ? `<div class="pbox"><div class="pl">♥ ORAÇÃO ♥</div>${m.oracao}</div>` : ''}
    ${m.meditacao ? `<div class="mbox"><div class="mi">📝</div><div><div class="ml">MEDITAÇÃO DO DIA</div><p>${m.meditacao}</p></div></div>` : ''}
    <div class="navb">
      <button class="nb" onclick="showReader(${i-1})" ${i===0?'disabled':''}>← Anterior</button>
      <button class="nb p" onclick="showIndex()">Índice</button>
      <button class="nb" onclick="showReader(${i+1})" ${i===msgs.length-1?'disabled':''}>Próxima →</button>
    </div>
  </div>`;
  show('reader');
  window.scrollTo(0,0);
}

function show(id){ document.getElementById(id).style.display = ''; }
function hide(id){ document.getElementById(id).style.display = 'none'; }

function formatarTexto(txt){
  if(!txt) return '';
  return txt.split('\n').filter(p=>p.trim()!=='').map(p=>`<p>${p}</p>`).join('');
}

// ============================================================
// MENSAGENS EMBUTIDAS (fallback quando mensagens.json não existe)
// ============================================================
function getMensagensEmbutidas(){
  return [{
    "id": 1,
    "titulo": "Bem-vindo",
    "icone": "🌱",
    "mes": "Junho 2026",
    "ref": "Gênesis 1:1",
    "versiculoTexto": "No princípio Deus criou os céus e a terra.",
    "texto": "Acompanhe diariamente nossas postagens de encorajamento espiritual.",
    "tema": "fe"
  }];
}
</script>
</body>
</html>
